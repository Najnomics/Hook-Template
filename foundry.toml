[profile.default]
bytecode_hash = "none"
auto_detect_solc = false
solc_version = "0.8.26"
evm_version = "cancun"
ffi = true
fs_permissions = [
  { access = "read-write", path = "." },
  { access = "read", path = "./broadcast" },
]
libs = ["lib"]
out = "out"
script = "script"
src = "src"
test = "test"
no_match_coverage = "^(script|lib)/"
optimizer = true
optimizer_runs = 10000
via_ir = false

[profile.ci]
fuzz = { runs = 2000 }
invariant = { runs = 256, depth = 64 }

[fmt]
line_length = 120

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = true
